name: Multiplatform Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v1.0.0)'
        required: true
        default: 'v1.0.0'
      platforms:
        description: 'Platforms to build (android, ios, desktop, web)'
        required: true
        default: 'android,desktop,web'
      upload_release:
        description: 'Upload artifacts to release'
        required: true
        default: true
        type: boolean

env:
  JAVA_VERSION: '17'

jobs:
  # Android 构建任务
  android:
    name: Android Build
    runs-on: ubuntu-latest
    if: contains(github.event.inputs.platforms, 'android') || github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Cache Gradle dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Android Debug APK
      run: ./gradlew :composeApp:assembleDebug --no-daemon
      
    - name: Build Android Release APK
      run: ./gradlew :composeApp:assembleRelease --no-daemon
      
    - name: Build Android Release AAB
      run: ./gradlew :composeApp:bundleRelease --no-daemon
      
    - name: Upload Android artifacts
      uses: actions/upload-artifact@v3
      with:
        name: android-artifacts
        path: |
          composeApp/build/outputs/apk/debug/*.apk
          composeApp/build/outputs/apk/release/*.apk
          composeApp/build/outputs/bundle/release/*.aab
        retention-days: 30

  # Desktop 构建任务
  desktop:
    name: Desktop Build
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    if: contains(github.event.inputs.platforms, 'desktop') || github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Cache Gradle dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Desktop
      run: |
        case "${{ runner.os }}" in
          Linux*)
            ./gradlew :composeApp:packageDeb --no-daemon
            ;;
          macOS*)
            ./gradlew :composeApp:packageDmg --no-daemon
            ;;
          Windows*)
            ./gradlew :composeApp:packageExe --no-daemon
            ;;
        esac
        
    - name: Upload Desktop artifacts
      uses: actions/upload-artifact@v3
      with:
        name: desktop-artifacts-${{ runner.os }}
        path: |
          composeApp/build/compose/binaries/main/**/*
        retention-days: 30

  # Web 构建任务
  web:
    name: Web Build
    runs-on: ubuntu-latest
    if: contains(github.event.inputs.platforms, 'web') || github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Cache Gradle dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build Web WASM
      run: ./gradlew :composeApp:wasmJsBrowserDistribution --no-daemon
      
    - name: Package Web files
      run: |
        cd composeApp/build/dist/wasmJs/productionExecutable
        zip -r ../../../juejin-app-web.zip .
        cd -
        
    - name: Upload Web artifacts
      uses: actions/upload-artifact@v3
      with:
        name: web-artifacts
        path: juejin-app-web.zip
        retention-days: 30

  # iOS 构建任务 (仅在 macOS 上)
  ios:
    name: iOS Build
    runs-on: macos-latest
    if: contains(github.event.inputs.platforms, 'ios') || github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Set up JDK ${{ env.JAVA_VERSION }}
      uses: actions/setup-java@v4
      with:
        java-version: ${{ env.JAVA_VERSION }}
        distribution: 'temurin'
        
    - name: Cache Gradle dependencies
      uses: actions/cache@v3
      with:
        path: |
          ~/.gradle/caches
          ~/.gradle/wrapper
        key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
        restore-keys: |
          ${{ runner.os }}-gradle-
          
    - name: Grant execute permission for gradlew
      run: chmod +x gradlew
      
    - name: Build iOS Framework
      run: ./gradlew :composeApp:embedAndSignAppleFrameworkForXcode --no-daemon
      
    - name: Upload iOS artifacts
      uses: actions/upload-artifact@v3
      with:
        name: ios-artifacts
        path: |
          composeApp/build/xcode-frameworks/**
          iosApp/**/*.xcodeproj
          iosApp/**/*.xcworkspace
        retention-days: 30

  # 创建 Release
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: [android, desktop, web, ios]
    if: (github.event.inputs.upload_release == 'true' || github.event_name == 'push') && always()
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Download all artifacts
      uses: actions/download-artifact@v3
      with:
        path: artifacts
        
    - name: Determine version
      id: version
      run: |
        if [[ "${{ github.event_name }}" == "push" ]]; then
          VERSION="${{ github.ref_name }}"
        else
          VERSION="${{ github.event.inputs.version }}"
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT
        
    - name: Create Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.version.outputs.version }}
        name: "Juejin App ${{ steps.version.outputs.version }}"
        body: |
          ## 📱 Juejin App ${{ steps.version.outputs.version }}
          
          ### 📦 下载说明
          
          **Android**
          - `*-android-debug.apk`: 调试版本，用于测试
          - `*-android-release.apk`: 正式版本APK
          - `*-android-release.aab`: Google Play发布格式
          
          **Desktop**
          - `*.dmg`: macOS 安装包
          - `*.deb`: Linux Debian包
          - `*.exe`: Windows 安装包
          
          **Web**
          - `*-web.zip`: Web版本，解压后用浏览器访问
          
          **iOS**
          - 需要通过Xcode构建和发布
          
          ### 🔧 系统要求
          - **Android**: Android 5.0+ (API 21+)
          - **iOS**: iOS 13.0+ (通过Xcode构建)
          - **Desktop**: Java 17+ 运行环境
          - **Web**: 支持WASM的现代浏览器
          
          ### 📱 更多信息
          - 项目主页: https://github.com/${{ github.repository }}
          - 问题反馈: https://github.com/${{ github.repository }}/issues
          
          ---
          
          🤖 自动化构建于 ${{ github.event.head_commit.timestamp }}
        files: |
          artifacts/android-artifacts/**/*.apk
          artifacts/android-artifacts/**/*.aab
          artifacts/desktop-artifacts-*/**/*.dmg
          artifacts/desktop-artifacts-*/**/*.deb
          artifacts/desktop-artifacts-*/**/*.exe
          artifacts/web-artifacts/**/*.zip
        draft: false
        prerelease: false
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
